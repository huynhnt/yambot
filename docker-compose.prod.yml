services:
  yambot-api:
    image: ghcr.io/huynhnt/yambot:latest
    container_name: yambot-api
    ports:
      - "8080:8080"
    volumes:
      - ./track.json:/app/track.json
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    restart: always

networks:
  default:
    external: true
    name: shared-network
